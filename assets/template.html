<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Price Drop Alert</title>
    <style>
      /* Responsive styles for mobile */
      @media screen and (max-width: 600px) {
        .container {
          width: 100% !important;
        }
      }
    </style>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      font-family:
        -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
        Helvetica, Arial, sans-serif;
    "
  >
    <table
      class="main"
      style="padding: 20px"
      border="0"
      cellpadding="0"
      cellspacing="0"
      width="100%"
    >
      <tr>
        <td align="center" style="padding: 40px 0">
          <table
            class="container"
            border="0"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              border-radius: 8px;
              overflow: hidden;
              box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
              max-width: 90%;
              width: 100%;
            "
          >
            <tr>
              <td
                class="content"
                style="padding: 40px; border-bottom: 1px solid #eeeeee"
              >
                <h1
                  style="
                    margin: 0;
                    font-size: 24px;
                    color: #1a1a1a;
                    font-weight: 700;
                  "
                >
                  Hello {{.Name}},
                </h1>
                <p style="margin: 10px 0 0 0; font-size: 16px; color: #666666">
                  We found some price drops on your watched sites.
                </p>
              </td>
            </tr>

            <tr>
              <td class="content" style="padding: 20px 40px">
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                  {{range .Products}}
                  <tr>
                    <td
                      style="padding: 20px 0; border-bottom: 1px solid #f9f9f9"
                    >
                      <table
                        border="0"
                        cellpadding="0"
                        cellspacing="0"
                        width="100%"
                      >
                        <tr>
                          <td
                            style="
                              font-size: 16px;
                              font-weight: 5500;
                              max-width: 15ch;
                              white-space: nowrap;
                              overflow: hidden;
                              text-overflow: ellipsis;
                            "
                          >
                            <a
                              href="{{ .URL}}"
                              target="_blank"
                              style="color: #333333"
                              >{{.Name}}</a
                            >
                          </td>
                          <td
                            align="right"
                            style="
                              font-size: 16px;
                              font-weight: 700;
                              color: #2ecc71;
                            "
                          >
                            € {{.Price}}
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  {{end}}
                </table>
              </td>
              <table border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td
                    style="
                      padding: 20px;
                      text-align: center;
                      font-size: 12px;
                      color: #999999;
                    "
                  >
                    <p>
                      Done by
                      <a
                        href="https://github.com/dffrs"
                        target="_blank"
                        style="color: #999999"
                        >dffrs</a
                      >
                    </p>
                  </td>
                </tr>
              </table>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
